services:
  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Bind mount (no volumen anónimo): el .db queda accesible directo
      # en el host para respaldos o inspección directa (sqlite3 CLI).
      - ./data:/data
    environment:
      PORT: "8080"
      DB_PATH: /data/meshcore.db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      H3_RESOLUTION: ${H3_RESOLUTION:-8}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8081}
      TZ: America/Bogota

  web:
    build:
      context: ../apps/web
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - api
    environment:
      TZ: America/Bogota

networks:
  default:
    name: meshcore-net
    external: false
