server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Compresión gzip: reduce drásticamente el payload de texto en
    # conexiones lentas (3G/LTE). JS/CSS/HTML/JSON pasan por gzip antes
    # de salir al cliente si el navegador envía Accept-Encoding: gzip.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # --- Assets estáticos con hash de contenido (Astro los emite bajo
    # _astro/): cache inmutable de 1 año. El hash garantiza que un
    # cambio de código produce una URL nueva, así que no hay riesgo de
    # servir versiones obsoletas.
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Service worker y favicon: sin caché (el SW debe actualizarse
    # en cada visita para que los cambios de versión se propaguen;
    # favicon.svg es pequeño y no tiene hash de contenido).
    location ~* ^/(sw\.js|favicon\.svg)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Proxy same-origin al backend: en prod PUBLIC_API_URL se hornea en
    # el build del frontend apuntando al propio dominio del sitio (no a
    # un subdominio api.* aparte), así el navegador nunca sale del origen
    # servido por este nginx y Traefik solo necesita rutear "web" — el
    # contenedor "api" no se publica directo. api.ts ya arma rutas como
    # "/api/v1/..."; el location y el proxy_pass comparten el mismo
    # prefijo "/api/" a propósito para que nginx lo reenvíe intacto.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /health no vive bajo /api/v1 (ver router.go) — se expone igual acá
    # para poder verificar api+nginx con un solo curl al puerto publicado
    # del contenedor web, sin necesitar acceso directo al contenedor api.
    location = /health {
        proxy_pass http://api:8080/health;
    }

    # Astro genera rutas limpias como carpetas (/login/index.html,
    # /register/index.html, etc). El default.conf de nginx:alpine no
    # trae try_files: al pedir /login (sin slash) resuelve el URI como
    # directorio y hace un 301 automático a "/login/" usando $host, que
    # en nginx NUNCA incluye el puerto — en un host expuesto en un
    # puerto no estándar (ej. localhost:8081) el navegador termina
    # siguiendo el redirect a http://localhost/login/ (puerto 80
    # implícito) y no resuelve. Sirviendo $uri/index.html directo por
    # try_files se evita el redirect por completo.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }
}
